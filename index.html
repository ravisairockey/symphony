<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <meta name="description" content="Creative Games Arcade - 9 immersive games with liquid glass design" /> <meta name="theme-color" content="#050510" /> <title>🎮 ARCADE - Creative Games</title> <link rel="preconnect" href="https://fonts.googleapis.com" /> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" /> <style> body { font-family: 'Inter', system-ui, sans-serif; } code, .font-mono { font-family: 'JetBrains Mono', monospace; } /* Prevent FOUC */ #root { min-height: 100vh; } /* Initial loading screen */ .app-loader { position: fixed; inset: 0; background: #050510; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease; } .app-loader.hidden { opacity: 0; pointer-events: none; } .app-loader-spinner { width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #00F5FF; border-radius: 50%; animation: spin 1s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } } </style> </head> <body> <div id="root"> <div class="app-loader" id="app-loader"> <div class="app-loader-spinner"></div> </div> </div> <script> // Remove loader when app mounts window.addEventListener('load', () => { setTimeout(() => { const loader = document.getElementById('app-loader'); if (loader) loader.classList.add('hidden'); }, 300); }); </script> <script type="module" src="/src/main.tsx"></script> </body> </html>
