<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Symphony — Immersive GPU Music Visualizer</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #00f2ff;
            --text-color: #ffffff;
            --panel-blur: 20px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Glassmorphic UI */
        .ui-overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .panel {
            pointer-events: all;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--panel-blur));
            -webkit-backdrop-filter: blur(var(--panel-blur));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .panel.hidden {
            transform: translateX(-20px);
            opacity: 0;
            pointer-events: none;
        }

        /* Left Controls Panel */
        #controls-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex-grow: 1;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .value-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            width: 40px;
            text-align: right;
        }

        select, button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        select:hover, button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: var(--accent-color);
            color: black;
            font-weight: bold;
            border: none;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #fff;
        }

        /* Right Stats Panel */
        #stats-panel {
            width: 200px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .stat-label {
            opacity: 0.6;
        }

        .stat-value {
            color: var(--accent-color);
        }

        .beat-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
            display: inline-block;
            margin-left: 5px;
            transition: background 0.1s, box-shadow 0.1s;
        }

        .beat-active {
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* Top Message / Guide */
        #guide {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            opacity: 0.6;
            font-size: 14px;
            letter-spacing: 1px;
        }

        #drop-zone {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 2px dashed var(--accent-color);
            pointer-events: none;
        }

        .hidden-input {
            display: none;
        }
    </style>
</head>
<body>

    <div id="drop-zone">
        <h1>DROP AUDIO FILE</h1>
    </div>

    <div id="guide">
        SPACE: Play/Pause | F: Fullscreen | H: Hide UI | M: Microphone | Drag audio file anywhere
    </div>

    <div class="ui-overlay">
        <div id="controls-panel" class="panel">
            <h2 style="margin: 0 0 10px 0; font-weight: 300; letter-spacing: 2px;">PARTICLE SYMPHONY</h2>
            
            <div class="control-group">
                <label>Visual Preset</label>
                <select id="preset-select">
                    <option value="nebula">Nebula Bloom</option>
                    <option value="wave">Kinetic Wave</option>
                    <option value="singularity">Singularity</option>
                    <option value="crystal">Crystalline Grid</option>
                    <option value="supernova">Supernova</option>
                </select>
            </div>

            <div class="control-group">
                <label>Particle Budget</label>
                <div class="slider-row">
                    <input type="range" id="budget-slider" min="10000" max="1048576" step="10000" value="262144">
                    <span class="value-display" id="budget-val">262k</span>
                </div>
            </div>

            <div class="control-group">
                <label>Volume</label>
                <div class="slider-row">
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.85">
                    <span class="value-display" id="volume-val">85%</span>
                </div>
            </div>

            <div class="control-group">
                <label>Beat Sensitivity</label>
                <div class="slider-row">
                    <input type="range" id="sensitivity-slider" min="0.1" max="2.0" step="0.01" value="0.62">
                    <span class="value-display" id="sensitivity-val">62%</span>
                </div>
            </div>

            <div class="control-group">
                <label>FFT Smoothing</label>
                <div class="slider-row">
                    <input type="range" id="smoothing-slider" min="0" max="0.99" step="0.01" value="0.82">
                    <span class="value-display" id="smoothing-val">82%</span>
                </div>
            </div>

            <div class="control-group">
                <label>Particle Size</label>
                <div class="slider-row">
                    <input type="range" id="size-slider" min="0.1" max="10.0" step="0.1" value="2.4">
                    <span class="value-display" id="size-val">2.4</span>
                </div>
            </div>

            <div class="control-group" style="flex-direction: row; gap: 10px; align-items: center;">
                <label style="margin:0">Post FX</label>
                <input type="checkbox" id="postfx-toggle" checked>
                <label style="margin:0">Auto Cam</label>
                <input type="checkbox" id="autocam-toggle" checked>
            </div>

            <button id="mic-btn">Enable Microphone</button>
            <button id="file-btn">Load Audio File</button>
            <input type="file" id="audio-upload" class="hidden-input" accept="audio/*">
            <button id="play-btn" class="btn-primary">PLAY / PAUSE</button>
        </div>

        <div id="stats-panel" class="panel">
            <div class="stat-item">
                <span class="stat-label">FPS</span>
                <span class="stat-value" id="stat-fps">--</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Particles</span>
                <span class="stat-value" id="stat-particles">--</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Source</span>
                <span class="stat-value" id="stat-source">Idle</span>
            </div>
            <div class="stat-item" style="align-items: center;">
                <span class="stat-label">Beat Signal</span>
                <div class="beat-indicator" id="beat-sig"></div>
            </div>
            <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 10px 0;">
            <div class="stat-item">
                <span class="stat-label">Low</span>
                <span class="stat-value" id="stat-low">0.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Mid</span>
                <span class="stat-value" id="stat-mid">0.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">High</span>
                <span class="stat-value" id="stat-high">0.00</span>
            </div>
        </div>
    </div>

    <!-- Three.js and dependencies from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
        import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

        /**
         * AUDIO ANALYSIS MODULE
         */
        class AudioAnalyzer {
            constructor() {
                this.context = null;
                this.analyser = null;
                this.source = null;
                this.dataArray = null;
                this.isInitialized = false;
                
                this.frequencyData = { low: 0, mid: 0, high: 0 };
                this.beatActive = false;
                this.lastEnergy = 0;
                
                this.settings = {
                    smoothing: 0.82,
                    sensitivity: 0.62,
                    volume: 0.85
                };
            }

            async init(type, streamOrFile = null) {
                if (!this.context) {
                    this.context = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                if (this.context.state === 'suspended') {
                    await this.context.resume();
                }

                if (this.analyser) this.analyser.disconnect();

                this.analyser = this.context.createAnalyser();
                this.analyser.fftSize = 2048;
                this.analyser.smoothingTimeConstant = this.settings.smoothing;
                
                const gainNode = this.context.createGain();
                gainNode.gain.value = this.settings.volume;

                if (type === 'mic') {
                    const stream = streamOrFile || await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.source = this.context.createMediaStreamSource(stream);
                    this.source.connect(this.analyser);
                    document.getElementById('stat-source').textContent = 'Microphone';
                } else if (type === 'file') {
                    const audio = new Audio(URL.createObjectURL(streamOrFile));
                    audio.crossOrigin = 'anonymous';
                    this.source = this.context.createMediaElementSource(audio);
                    this.source.connect(gainNode).connect(this.context.destination);
                    gainNode.connect(this.analyser);
                    this.audioElement = audio;
                    document.getElementById('stat-source').textContent = 'File';
                }

                this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                this.isInitialized = true;
                return this.audioElement || null;
            }

            update() {
                if (!this.isInitialized) return;
                
                this.analyser.getByteFrequencyData(this.dataArray);
                
                // Frequency range splits
                let low = 0, mid = 0, high = 0;
                const len = this.dataArray.length;
                
                for (let i = 0; i < len * 0.1; i++) low += this.dataArray[i];
                for (let i = Math.floor(len * 0.1); i < len * 0.4; i++) mid += this.dataArray[i];
                for (let i = Math.floor(len * 0.4); i < len * 0.8; i++) high += this.dataArray[i];
                
                this.frequencyData.low = (low / (len * 0.1)) / 255;
                this.frequencyData.mid = (mid / (len * 0.3)) / 255;
                this.frequencyData.high = (high / (len * 0.4)) / 255;
                
                // Simple beat detection (energy delta)
                const currentEnergy = this.frequencyData.low;
                const delta = currentEnergy - this.lastEnergy;
                this.beatActive = delta > (0.1 * this.settings.sensitivity);
                this.lastEnergy = currentEnergy;
            }

            togglePlay() {
                if (!this.audioElement) return;
                if (this.audioElement.paused) this.audioElement.play();
                else this.audioElement.pause();
            }
        }

        /**
         * GPGPU PARTICLE SYSTEM
         */
        class GPUParticleSystem {
            constructor(scene, renderer) {
                this.scene = scene;
                this.renderer = renderer;
                this.particleCount = 262144; // Default 512x512
                this.textureSize = 512;
                
                this.initGPGPU();
                this.initRenderMesh();
            }

            initGPGPU() {
                // Textures for Position and Velocity (Ping-Pong)
                this.posA = this.createDataTexture();
                this.posB = this.createDataTexture();
                this.velA = this.createDataTexture();
                this.velB = this.createDataTexture();

                this.initPositionData();
                this.initVelocityData();

                // Compute Shaders
                this.posMaterial = new THREE.ShaderMaterial({
                    uniforms: {
                        tPos: { value: null },
                        tVel: { value: null },
                        uDeltaTime: { value: 0 },
                        uAudioLow: { value: 0 },
                        uAudioMid: { value: 0 },
                        uAudioHigh: { value: 0 },
                        uBeat: { value: 0 },
                        uMouse: { value: new THREE.Vector3() },
                        uPreset: { value: 0 }
                    },
                    vertexShader: `void main() { gl_Position = vec4(0.0); }`, // Not used for rendering
                    fragmentShader: this.getPosFragmentShader()
                });

                this.velMaterial = new THREE.ShaderMaterial({
                    uniforms: {
                        tPos: { value: null },
                        tVel: { value: null },
                        uDeltaTime: { value: 0 },
                        uAudioLow: { value: 0 },
                        uAudioMid: { value: 0 },
                        uAudioHigh: { value: 0 },
                        uBeat: { value: 0 },
                        uMouse: { value: new THREE.Vector3() },
                        uPreset: { value: 0 }
                    },
                    vertexShader: `void main() { gl_Position = vec4(0.0); }`,
                    fragmentShader: this.getVelFragmentShader()
                });

                this.gpgpuScene = new THREE.Scene();
                this.gpgpuCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                this.gpgpuQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), this.posMaterial);
                this.gpgpuScene.add(this.gpgpuQuad);
            }

            createDataTexture() {
                const data = new Float32Array(this.textureSize * this.textureSize * 4);
                const tex = new THREE.DataTexture(data, this.textureSize, this.textureSize, THREE.RGBAFormat, THREE.FloatType);
                tex.needsUpdate = true;
                return tex;
            }

            initPositionData() {
                const data = this.posA.image.data;
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = (Math.random() - 0.5) * 10;
                    data[i+1] = (Math.random() - 0.5) * 10;
                    data[i+2] = (Math.random() - 0.5) * 10;
                    data[i+3] = 1.0;
                }
                this.posA.needsUpdate = true;
                this.posB.image.data.set(data);
                this.posB.needsUpdate = true;
            }

            initVelocityData() {
                const data = this.velA.image.data;
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = (Math.random() - 0.5) * 0.1;
                    data[i+1] = (Math.random() - 0.5) * 0.1;
                    data[i+2] = (Math.random() - 0.5) * 0.1;
                    data[i+3] = 0.0;
                }
                this.velA.needsUpdate = true;
                this.velB.image.data.set(data);
                this.velB.needsUpdate = true;
            }

            initRenderMesh() {
                const geo = new THREE.BufferGeometry();
                const positions = new Float32Array(this.particleCount * 3);
                const uvs = new Float32Array(this.particleCount * 2);

                for (let i = 0; i < this.particleCount; i++) {
                    const x = (i % this.textureSize) / this.textureSize;
                    const y = Math.floor(i / this.textureSize) / this.textureSize;
                    uvs[i * 2] = x;
                    uvs[i * 2 + 1] = y;
                }

                geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));

                this.renderMaterial = new THREE.ShaderMaterial({
                    uniforms: {
                        tPos: { value: null },
                        uSize: { value: 2.4 },
                        uAudioLow: { value: 0 },
                        uPreset: { value: 0 }
                    },
                    vertexShader: this.getRenderVertexShader(),
                    fragmentShader: this.getRenderFragmentShader(),
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                this.points = new THREE.Points(geo, this.renderMaterial);
                this.scene.add(this.points);
            }

            getPosFragmentShader() {
                return `
                    uniform sampler2D tPos;
                    uniform sampler2D tVel;
                    uniform float uDeltaTime;
                    void main() {
                        vec2 uv = gl_FragCoord.xy / ${this.textureSize}.0;
                        vec3 pos = texture2D(tPos, uv).rgb;
                        vec3 vel = texture2D(tVel, uv).rgb;
                        pos += vel * uDeltaTime * 60.0;
                        gl_FragColor = vec4(pos, 1.0);
                    }
                `;
            }

            getVelFragmentShader() {
                return `
                    uniform sampler2D tPos;
                    uniform sampler2D tVel;
                    uniform float uDeltaTime;
                    uniform float uAudioLow;
                    uniform float uAudioMid;
                    uniform float uAudioHigh;
                    uniform float uBeat;
                    uniform vec3 uMouse;
                    uniform float uPreset;

                    void main() {
                        vec2 uv = gl_FragCoord.xy / ${this.textureSize}.0;
                        vec3 pos = texture2D(tPos, uv).rgb;
                        vec3 vel = texture2D(tVel, uv).rgb;
                        
                        vec3 force = vec3(0.0);
                        
                        // Preset-based forces
                        if(uPreset == 0.0) { // Nebula
                            force -= pos * 0.01 * (1.0 + uAudioLow * 5.0);
                            force += normalize(uMouse - pos) * 0.02 * (1.0 - length(uMouse - pos));
                        } else if(uPreset == 1.0) { // Wave
                            force.y += sin(pos.x * 0.5 + uAudioLow * 10.0) * 0.01;
                            force -= pos * 0.02;
                        } else if(uPreset == 2.0) { // Singularity
                            float d = length(pos);
                            force -= normalize(pos) * (0.1 / (d + 0.1)) * uAudioLow;
                        } else if(uPreset == 3.0) { // Crystal
                            force -= pos * 0.05;
                            force += vec3(round(pos.x * 2.0), round(pos.y * 2.0), round(pos.z * 2.0)) * 0.01;
                        } else { // Supernova
                            force += normalize(pos) * uBeat * 0.5;
                            force -= pos * 0.01;
                        }

                        vel += force * uDeltaTime * 60.0;
                        vel *= 0.98; // friction
                        gl_FragColor = vec4(vel, 1.0);
                    }
                `;
            }

            getRenderVertexShader() {
                return `
                    uniform sampler2D tPos;
                    uniform float uSize;
                    uniform float uAudioLow;
                    varying float vLow;
                    void main() {
                        vec3 pos = texture2D(tPos, uv).rgb;
                        vLow = uAudioLow;
                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = uSize * (1.0 + uAudioLow * 2.0) * (1000.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `;
            }

            getRenderFragmentShader() {
                return `
                    varying float vLow;
                    uniform float uPreset;
                    void main() {
                        float d = length(gl_PointCoord - vec2(0.5));
                        if(d > 0.5) discard;
                        
                        vec3 color = vec3(0.1, 0.4, 0.9);
                        if(uPreset == 0.0) color = mix(vec3(0.1, 0.2, 0.8), vec3(0.8, 0.2, 0.9), vLow);
                        else if(uPreset == 1.0) color = mix(vec3(0.1, 0.8, 0.5), vec3(0.1, 0.3, 0.8), vLow);
                        else if(uPreset == 2.0) color = mix(vec3(0.8, 0.1, 0.1), vec3(1.0, 0.8, 0.2), vLow);
                        else if(uPreset == 3.0) color = mix(vec3(0.4, 0.4, 0.4), vec3(0.0, 1.0, 1.0), vLow);
                        else color = mix(vec3(1.0, 0.5, 0.1), vec3(1.0, 1.0, 1.0), vLow);

                        // HDR Boost for Bloom
                        color *= (1.0 + vLow * 2.0);
                        gl_FragColor = vec4(color, 1.0 - d * 2.0);
                    }
                `;
            }

            update(dt, audio, mouse, presetIdx) {
                this.posMaterial.uniforms.uDeltaTime.value = dt;
                this.velMaterial.uniforms.uDeltaTime.value = dt;
                this.posMaterial.uniforms.uAudioLow.value = audio.frequencyData.low;
                this.velMaterial.uniforms.uAudioLow.value = audio.frequencyData.low;
                this.velMaterial.uniforms.uAudioMid.value = audio.frequencyData.mid;
                this.velMaterial.uniforms.uAudioHigh.value = audio.frequencyData.high;
                this.velMaterial.uniforms.uBeat.value = audio.beatActive ? 1.0 : 0.0;
                this.velMaterial.uniforms.uMouse.value.copy(mouse);
                this.velMaterial.uniforms.uPreset.value = presetIdx;
                this.posMaterial.uniforms.uPreset.value = presetIdx;
                
                this.renderMaterial.uniforms.uAudioLow.value = audio.frequencyData.low;
                this.renderMaterial.uniforms.uPreset.value = presetIdx;

                // Execute GPGPU update
                this.renderer.setRenderTarget(this.renderer.getRenderTarget(this.velB));
                this.gpgpuQuad.material = this.velMaterial;
                this.velMaterial.uniforms.tPos.value = this.posA;
                this.velMaterial.uniforms.tVel.value = this.velA;
                this.renderer.render(this.gpgpuScene, this.gpgpuCamera);

                this.renderer.setRenderTarget(this.renderer.getRenderTarget(this.posB));
                this.gpgpuQuad.material = this.posMaterial;
                this.posMaterial.uniforms.tPos.value = this.posA;
                this.posMaterial.uniforms.tVel.value = this.velB;
                this.renderer.render(this.gpgpuScene, this.gpgpuCamera);

                // Swap buffers
                [this.posA, this.posB] = [this.posB, this.posA];
                [this.velA, this.velB] = [this.velB, this.velA];

                this.renderMaterial.uniforms.tPos.value = this.posA;
                this.renderer.setRenderTarget(null);
            }
        }

        /**
         * MAIN APPLICATION
         */
        class App {
            constructor() {
                this.initScene();
                this.initAudio();
                this.initUI();
                this.initEvents();
                
                this.clock = new THREE.Clock();
                this.mouse = new THREE.Vector3();
                this.presetIdx = 0;
                
                this.animate();
            }

            initScene() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.z = 20;

                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ReinhardToneMapping;
                document.body.appendChild(this.renderer.domElement);

                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;

                this.particles = new GPUParticleSystem(this.scene, this.renderer);
                
                // Render target helper for GPGPU
                this.renderer.getRenderTarget = (tex) => {
                    if (!this.rtMap) this.rtMap = new Map();
                    if (!this.rtMap.has(tex)) {
                        const rt = new THREE.WebGLRenderTarget(this.particles.textureSize, this.particles.textureSize, {
                            minFilter: THREE.NearestFilter,
                            magFilter: THREE.NearestFilter,
                            format: THREE.RGBAFormat,
                            type: THREE.FloatType
                        });
                        this.rtMap.set(tex, rt);
                    }
                    return this.rtMap.get(tex);
                };

                // Post Processing
                this.composer = new EffectComposer(this.renderer);
                this.composer.addPass(new RenderPass(this.scene, this.camera));
                
                this.bloomPass = new UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth, window.innerHeight),
                    1.5, 0.4, 0.85
                );
                this.composer.addPass(this.bloomPass);
            }

            initAudio() {
                this.audio = new AudioAnalyzer();
            }

            initUI() {
                this.ui = {
                    budget: document.getElementById('budget-slider'),
                    budgetVal: document.getElementById('budget-val'),
                    vol: document.getElementById('volume-slider'),
                    volVal: document.getElementById('volume-val'),
                    sens: document.getElementById('sensitivity-slider'),
                    sensVal: document.getElementById('sensitivity-val'),
                    smooth: document.getElementById('smoothing-slider'),
                    smoothVal: document.getElementById('smoothing-val'),
                    size: document.getElementById('size-slider'),
                    sizeVal: document.getElementById('size-val'),
                    preset: document.getElementById('preset-select'),
                    playBtn: document.getElementById('play-btn'),
                    micBtn: document.getElementById('mic-btn'),
                    fileBtn: document.getElementById('file-btn'),
                    upload: document.getElementById('audio-upload'),
                    beatSig: document.getElementById('beat-sig'),
                    statFps: document.getElementById('stat-fps'),
                    statPart: document.getElementById('stat-particles'),
                    statLow: document.getElementById('stat-low'),
                    statMid: document.getElementById('stat-mid'),
                    statHigh: document.getElementById('stat-high')
                };

                this.ui.budget.oninput = () => {
                    this.ui.budgetVal.textContent = (this.ui.budget.value / 1000).toFixed(0) + 'k';
                    this.particles.particleCount = parseInt(this.ui.budget.value);
                };
                this.ui.vol.oninput = () => {
                    this.audio.settings.volume = parseFloat(this.ui.vol.value);
                    this.ui.volVal.textContent = Math.round(this.ui.vol.value * 100) + '%';
                };
                this.ui.sens.oninput = () => {
                    this.audio.settings.sensitivity = parseFloat(this.ui.sens.value);
                    this.ui.sensVal.textContent = Math.round(this.ui.sens.value * 100) + '%';
                };
                this.ui.smooth.oninput = () => {
                    this.audio.settings.smoothing = parseFloat(this.ui.smooth.value);
                    if(this.audio.analyser) this.audio.analyser.smoothingTimeConstant = this.audio.settings.smoothing;
                    this.ui.smoothVal.textContent = Math.round(this.ui.smooth.value * 100) + '%';
                };
                this.ui.size.oninput = () => {
                    this.particles.renderMaterial.uniforms.uSize.value = parseFloat(this.ui.size.value);
                    this.ui.sizeVal.textContent = this.ui.size.value;
                };
                this.ui.preset.onchange = () => {
                    const presets = { nebula: 0, wave: 1, singularity: 2, crystal: 3, supernova: 4 };
                    this.presetIdx = presets[this.ui.preset.value];
                };

                this.ui.playBtn.onclick = () => this.audio.togglePlay();
                this.ui.micBtn.onclick = async () => {
                    await this.audio.init('mic');
                };
                this.ui.fileBtn.onclick = () => this.ui.upload.click();
                this.ui.upload.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (file) await this.audio.init('file', file);
                };
            }

            initEvents() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    this.composer.setSize(window.innerWidth, window.innerHeight);
                });

                window.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') this.audio.togglePlay();
                    if (e.code === 'KeyF') {
                        if (!document.fullscreenElement) this.renderer.domElement.requestFullscreen();
                        else document.exitFullscreen();
                    }
                    if (e.code === 'KeyH') {
                        document.querySelectorAll('.panel').forEach(p => p.classList.toggle('hidden'));
                    }
                    if (e.code === 'KeyM') {
                        this.audio.init('mic');
                    }
                });

                window.addEventListener('mousemove', (e) => {
                    this.mouse.set(
                        (e.clientX / window.innerWidth) * 2 - 1,
                        -(e.clientY / window.innerHeight) * 2 + 1,
                        0
                    ).multiplyScalar(10);
                });

                // Drag and Drop
                window.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    document.getElementById('drop-zone').style.display = 'flex';
                });
                window.addEventListener('dragleave', () => {
                    document.getElementById('drop-zone').style.display = 'none';
                });
                window.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    document.getElementById('drop-zone').style.display = 'none';
                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('audio/')) {
                        await this.audio.init('file', file);
                    }
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                
                const dt = this.clock.getDelta();
                this.audio.update();
                
                this.particles.update(dt, this.audio, this.mouse, this.presetIdx);
                
                if (document.getElementById('autocam-toggle').checked) {
                    const time = Date.now() * 0.0005;
                    this.camera.position.x = Math.sin(time) * 20;
                    this.camera.position.z = Math.cos(time) * 20;
                    this.camera.lookAt(0, 0, 0);
                } else {
                    this.controls.update();
                }

                if (document.getElementById('postfx-toggle').checked) {
                    this.composer.render();
                } else {
                    this.renderer.render(this.scene, this.camera);
                }
                this.updateStats(dt);
            }

            updateStats(dt) {
                this.ui.statFps.textContent = Math.round(1 / dt);
                this.ui.statPart.textContent = (this.particles.particleCount / 1000).toFixed(0) + 'k';
                this.ui.statLow.textContent = this.audio.frequencyData.low.toFixed(2);
                this.ui.statMid.textContent = this.audio.frequencyData.mid.toFixed(2);
                this.ui.statHigh.textContent = this.audio.frequencyData.high.toFixed(2);
                
                if (this.audio.beatActive) {
                    this.ui.beatSig.classList.add('beat-active');
                } else {
                    this.ui.beatSig.classList.remove('beat-active');
                }
            }
        }

        new App();
    </script>
</body>
</html>
